<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>System Rezerwacji Floty</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4">Nasza Flota</h1>
        <div class="row">
            {% for car in vehicles %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ car.marka }} {{ car.model }}</h5>
                        <p class="card-text text-muted">VIN: {{ car.vin }}</p>
                        <span class="badge {% if car.status == 'dostępny' %}bg-success{% else %}bg-warning text-dark{% endif %}">
                            {{ car.status|upper }}
                        </span>
                    </div>
                    <div class="card-footer bg-white border-top-0">
                        <a href="{% url 'car_detail' car.id %}" class="btn btn-outline-primary w-100">Zarezerwuj</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <p>Obecnie brak pojazdów w systemie.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
